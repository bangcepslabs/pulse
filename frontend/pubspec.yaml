name: pulse
description: AI-powered real-time news analysis platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.6.0
  intl: ^0.19.0
  url_launcher: ^6.1.14
  web_smooth_scroll: ^2.0.0
  syncfusion_flutter_gauges: ^24.1.41
  visibility_detector: ^0.4.0+2
  fl_chart: ^1.2.0
  webview_flutter: ^4.4.2
  webview_flutter_web: ^0.2.3+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  web: true
  windows: true
  macos: false
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
